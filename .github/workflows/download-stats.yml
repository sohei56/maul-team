name: Record release download counts

# Appends a weekly snapshot of GitHub Releases asset download counts to
# `metrics/downloads.jsonl` (one JSON object per line) on the data-only
# `metrics` branch. `download_count` is cumulative-only in the API, so the
# funnel's bottom step (dmg downloads over time) can only be reconstructed
# from periodic snapshots like these.
# The snapshots live on a dedicated branch because `main` is protected
# (PRs + required checks): a weekly data append should neither open PRs nor
# loosen protection. The branch was seeded once by hand; if it is ever
# deleted, re-seed it before this workflow can run.
# Read the data raw:
# https://raw.githubusercontent.com/sohei56/maul-team/metrics/metrics/downloads.jsonl
on:
  schedule:
    - cron: "0 21 * * 0" # weekly, Sunday 21:00 UTC = Monday 06:00 JST
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: download-stats
  cancel-in-progress: false

jobs:
  snapshot:
    name: Snapshot download_count into metrics/downloads.jsonl
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: metrics

      - name: Append snapshot
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p metrics
          # -s (slurp) + add: --paginate emits one array per page; merge them
          # so multi-page release lists still produce a single snapshot line.
          gh api "repos/${GITHUB_REPOSITORY}/releases" --paginate |
            jq -c -s --arg date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" '
              add // []
              | [ .[] | {tag: .tag_name, assets: [ .assets[] | {name: .name, download_count: .download_count} ]} ]
              | {date: $date,
                 releases: .,
                 total: ([ .[].assets[].download_count ] | add // 0)}
            ' >> metrics/downloads.jsonl

      - name: Commit snapshot
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add metrics/downloads.jsonl
          if git diff --cached --quiet; then
            echo "No change to commit."
            exit 0
          fi
          git commit -m "chore(metrics): weekly release download snapshot [skip ci]"
          git push origin HEAD:metrics
